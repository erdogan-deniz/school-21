name: c

on:
  push:
    branches: [main]
    paths:
      - 'c/**'
      - '.clang-format'
      - '.github/workflows/c.yml'
  pull_request:
    branches: [main]
    paths:
      - 'c/**'
      - '.clang-format'
      - '.github/workflows/c.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: clang-format check
    runs-on: ubuntu-latest
    continue-on-error: true  # informational until we land a repo-wide format pass
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check C source formatting
        run: |
          # Exclude vendored / build / generated paths.
          mapfile -t files < <(
            find c/ \( -name '*.c' -o -name '*.h' \) \
              -not -path '*/Qt/*' \
              -not -path '*/build*/*' \
              -not -path '*/QtGifImage*/*' \
              -not -path '*moc_*' \
              -not -path '*ui_*'
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C sources found."
            exit 0
          fi
          echo "Checking ${#files[@]} files..."
          clang-format --dry-run -Werror "${files[@]}"

  build-and-test:
    # Library subprojects: full make + make test in c/<sub>/src.
    name: build & test
    runs-on: ubuntu-latest
    continue-on-error: true  # initial pass: collect data without gating
    strategy:
      fail-fast: false
      matrix:
        subproject:
          - SimpleBashUtils
          - s21_decimal
          - s21_math
          - s21_matrix
          - s21_string+
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            check libsubunit-dev \
            lcov gcovr
      - name: Detect build entry point
        id: entry
        working-directory: c/${{ matrix.subproject }}/src
        run: |
          if [ -f Makefile ]; then
            echo "kind=top" >> "$GITHUB_OUTPUT"
            echo "Found c/${{ matrix.subproject }}/src/Makefile"
          else
            # SimpleBashUtils has per-utility Makefiles (cat/, grep/) — handle below.
            echo "kind=split" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        working-directory: c/${{ matrix.subproject }}/src
        run: |
          if [ "${{ steps.entry.outputs.kind }}" = "top" ]; then
            make
          else
            for d in */ ; do
              if [ -f "$d/Makefile" ]; then ( cd "$d" && make ); fi
            done
          fi
      - name: Test
        working-directory: c/${{ matrix.subproject }}/src
        run: |
          if [ "${{ steps.entry.outputs.kind }}" = "top" ]; then
            make test || true   # surface failures, don't gate yet
          else
            for d in */ ; do
              if [ -f "$d/Makefile" ]; then ( cd "$d" && make test 2>/dev/null || true ); fi
            done
          fi
      - name: Coverage report (best-effort)
        working-directory: c/${{ matrix.subproject }}/src
        run: |
          make gcov_report 2>/dev/null || true
        continue-on-error: true

  apps-c-tests:
    # GUI applications: only the C-business-logic test target, which
    # does not depend on Qt. The qmake-driven GUI build runs in
    # apps-qt-build below.
    name: apps C-only tests
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        subproject:
          - 3DViewer_v1.0
          - SmartCalc_v1.0
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            check libsubunit-dev \
            lcov gcovr
      - name: Run C-only tests
        working-directory: c/${{ matrix.subproject }}/src
        run: |
          # SmartCalc_v1.0 has a dedicated 'test' target that compiles
          # only business logic (no qmake). 3DViewer_v1.0 historically
          # uses 3d_viewer_test.c with the same Check-based pattern;
          # try 'make test' first, fall back to a direct compile.
          if make -n test >/dev/null 2>&1; then
            make test
          else
            echo "no 'test' target; attempting direct compile of *_test.c"
            $(CC=${CC:-gcc}; $CC -Wall -Wextra -Wno-error -std=c11 \
              *.c -lcheck -lsubunit -lpthread -lrt -lm -o test_bin) || true
            ./test_bin || true
          fi
        continue-on-error: true

  apps-qt-build:
    # Qt6 GUI build for the two C apps (3DViewer_v1.0, SmartCalc_v1.0).
    # Uses jurplel/install-qt-action to provision Qt, then runs the
    # subproject's own 'build' / 'install' Makefile target via xvfb.
    name: apps Qt6 GUI build
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - subproject: 3DViewer_v1.0
            target: build
          - subproject: SmartCalc_v1.0
            target: install
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: true
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            xvfb \
            libgl1-mesa-dev libglu1-mesa-dev \
            check libsubunit-dev
      - name: GUI build (xvfb-wrapped)
        working-directory: c/${{ matrix.subproject }}/src
        run: |
          # Some Makefiles call 'open' or expect ~/Desktop — wrap in
          # xvfb-run and tolerate post-build install steps that need
          # a display.
          xvfb-run -a make ${{ matrix.target }} || true
        continue-on-error: true
