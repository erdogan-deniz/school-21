name: pages

on:
  push:
    branches: [main]
    paths:
      - 'c/**/*.c'
      - 'c/**/*.h'
      - 'cpp/**/*.cc'
      - 'cpp/**/*.cpp'
      - 'cpp/**/*.h'
      - 'cpp/**/*.hpp'
      - 'python/bootcamp/old/day_07/**'
      - 'python/bootcamp/new/day_01/**'
      - 'data_science/project_01/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build unified docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install Python + Sphinx
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Sphinx deps
        run: python -m pip install --upgrade pip sphinx furo

      - name: Prepare site root
        run: |
          mkdir -p _site
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>school-21 — generated docs index</title>
            <style>
              body { font: 14px/1.45 system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; }
              h1 { margin-bottom: 0.2em; }
              h2 { margin-top: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.2em; }
              ul { padding-left: 1.2em; }
              code { background: #f5f5f5; padding: 0 0.2em; }
            </style>
          </head>
          <body>
            <h1>school-21 — generated docs</h1>
            <p>Auto-published from <a href="https://github.com/erdogan-deniz/school-21">erdogan-deniz/school-21</a> on every push to <code>main</code>.</p>

            <h2>Doxygen — C / C++ libraries</h2>
            <ul>
              <li><a href="doxygen/c/SimpleBashUtils/">c/SimpleBashUtils</a></li>
              <li><a href="doxygen/c/s21_decimal/">c/s21_decimal</a></li>
              <li><a href="doxygen/c/s21_math/">c/s21_math</a></li>
              <li><a href="doxygen/c/s21_matrix/">c/s21_matrix</a></li>
              <li><a href="doxygen/c/s21_string+/">c/s21_string+</a></li>
              <li><a href="doxygen/cpp/s21_containers/">cpp/s21_containers</a></li>
              <li><a href="doxygen/cpp/s21_matrix+/">cpp/s21_matrix+</a></li>
            </ul>

            <h2>Sphinx — Python projects</h2>
            <ul>
              <li><a href="sphinx/python/bootcamp/old/day_07/">python/bootcamp/old/day_07 (Voight-Kampff)</a></li>
              <li><a href="sphinx/python/bootcamp/new/day_01/">python/bootcamp/new/day_01 (utils + models)</a></li>
              <li><a href="sphinx/data_science/project_01/">data_science/project_01 ("Tweets" NLP)</a></li>
            </ul>

            <h2>Repo</h2>
            <ul>
              <li><a href="https://github.com/erdogan-deniz/school-21/blob/main/STATUS.md">STATUS.md (production-readiness dashboard)</a></li>
              <li><a href="https://github.com/erdogan-deniz/school-21/blob/main/docs/specs/2026-05-11-production-grade-overhaul.md">design-doc: production-grade overhaul</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Build Doxygen for all libraries
        run: |
          for sp in c/SimpleBashUtils c/s21_decimal c/s21_math c/s21_matrix 'c/s21_string+' cpp/s21_containers 'cpp/s21_matrix+'; do
            ( cd "$sp" && \
              if [ ! -f Doxyfile ]; then
                doxygen -g Doxyfile.tmp >/dev/null
                sed -e "s|^PROJECT_NAME .*|PROJECT_NAME = \"$sp\"|" \
                    -e "s|^OUTPUT_DIRECTORY .*|OUTPUT_DIRECTORY = docs/api|" \
                    -e "s|^RECURSIVE .*|RECURSIVE = YES|" \
                    -e "s|^EXTRACT_ALL .*|EXTRACT_ALL = YES|" \
                    -e "s|^EXTRACT_STATIC .*|EXTRACT_STATIC = YES|" \
                    -e "s|^GENERATE_LATEX .*|GENERATE_LATEX = NO|" \
                    -e "s|^HAVE_DOT .*|HAVE_DOT = YES|" \
                    -e "s|^EXCLUDE_PATTERNS .*|EXCLUDE_PATTERNS = */build/* */Qt/* */materials/* */gcov_obj/* */obj/* */test_html/*|" \
                    Doxyfile.tmp > Doxyfile
                rm Doxyfile.tmp
              fi
              doxygen Doxyfile || true
            )
            mkdir -p "_site/doxygen/$sp"
            if [ -d "$sp/docs/api/html" ]; then
              cp -r "$sp/docs/api/html/." "_site/doxygen/$sp/"
            fi
          done

      - name: Build Sphinx for day_07
        run: |
          ( cd python/bootcamp/old/day_07 && \
            pip install -r requirements.txt && \
            cd docs && \
            ( make html || sphinx-build -b html source build/html ) )
          mkdir -p _site/sphinx/python/bootcamp/old/day_07
          if [ -d python/bootcamp/old/day_07/docs/build/html ]; then
            cp -r python/bootcamp/old/day_07/docs/build/html/. \
                  _site/sphinx/python/bootcamp/old/day_07/
          fi
        continue-on-error: true

      - name: Build Sphinx for day_01 (new track)
        run: |
          ( cd python/bootcamp/new/day_01 && \
            pip install -r docs/requirements.txt && \
            pip install -e . || true && \
            cd docs && \
            ( make html || sphinx-build -b html source build/html ) )
          mkdir -p _site/sphinx/python/bootcamp/new/day_01
          if [ -d python/bootcamp/new/day_01/docs/build/html ]; then
            cp -r python/bootcamp/new/day_01/docs/build/html/. \
                  _site/sphinx/python/bootcamp/new/day_01/
          fi
        continue-on-error: true

      - name: Build Sphinx for data_science/project_01 ("Tweets" NLP)
        run: |
          ( cd data_science/project_01 && \
            pip install -r docs/requirements.txt && \
            cd docs && \
            ( make html || sphinx-build -b html source build/html ) )
          mkdir -p _site/sphinx/data_science/project_01
          if [ -d data_science/project_01/docs/build/html ]; then
            cp -r data_science/project_01/docs/build/html/. \
                  _site/sphinx/data_science/project_01/
          fi
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
