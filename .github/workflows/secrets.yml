name: secrets

# Secret scanning — triggered after the 2026-05-11 hardcoded-credential
# incidents (Telegram bot token in devops/ci_cd/src/notify.sh; local
# Postgres password in python/bootcamp/old/day_06/src/arguments.py).
#
# Mirrors the local pre-commit `gitleaks` hook so the gate works on
# both ends: pre-commit catches new leaks before they're recorded; CI
# catches anything that slipped through (or that someone committed
# without running pre-commit).
#
# The full git history scan runs on every push/PR. Findings publish
# to the workflow summary; the job blocks the merge unless the value
# is allow-listed in .gitleaks.toml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    # Soft gate for the first week — flip to hard once we confirm no
    # historical false-positives slip through the allow-list.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so gitleaks scans every commit
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only needed for org-wide private repos; this
          # is a personal public repo so it can be omitted.
          GITLEAKS_CONFIG: .gitleaks.toml
