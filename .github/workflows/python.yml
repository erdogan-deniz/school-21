name: python

on:
  push:
    branches: [main]
    paths:
      - 'python/**'
      - 'algorithms/python/**'
      - 'data_science/**'
      - 'machine_learning/**'
      - 'qa/**'
      - '.ruff.toml'
      - '.github/workflows/python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - 'algorithms/python/**'
      - 'data_science/**'
      - 'machine_learning/**'
      - 'qa/**'
      - '.ruff.toml'
      - '.github/workflows/python.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: ruff (lint + format check)
    runs-on: ubuntu-latest
    # Format pass landed in commits 4243c5d2 + db3f12e4; format gate
    # is now hard. Lint gate stays soft until the remaining 181
    # findings (unsafe-fix territory) get per-subproject triage.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff==0.6.9
      - name: Lint (informational)
        run: ruff check python/ algorithms/python/ data_science/ machine_learning/ qa/ || true
      - name: Format check (gating)
        run: ruff format --check python/ algorithms/python/ data_science/ machine_learning/ qa/

  bandit:
    name: bandit (Python SAST)
    runs-on: ubuntu-latest
    # Soft-gated for the first week: bandit on a bootcamp tree will
    # flag a lot of educational `assert`, `random` for non-crypto,
    # `subprocess` without shell, etc. Triage and config-tune via
    # `.bandit` (or skip-list in the run line) before flipping hard.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install bandit
        run: python -m pip install --upgrade pip 'bandit[toml]==1.7.10'
      - name: Run bandit
        # `-r` recursive, `-c .bandit` picks up the repo-level config
        # (skips, exclude paths). Severity / confidence filters apply
        # to the report only — full scan still runs.
        run: |
          bandit -r \
            -c .bandit \
            --severity-level medium \
            --confidence-level medium \
            python/ algorithms/python/ data_science/ machine_learning/ qa/ \
            || true

  pip-audit:
    name: pip-audit (vulnerable deps)
    runs-on: ubuntu-latest
    continue-on-error: true
    # Scans every requirements.txt across the Python subprojects for
    # known-CVE packages via PyPI's advisory database. Same soft gate
    # initial-pass story as bandit — flip hard once we've triaged
    # whatever historical pins surface.
    strategy:
      fail-fast: false
      matrix:
        # Subprojects with a real requirements.txt worth scanning.
        # Drop the entry when a sub-day shares the parent's reqs (e.g.
        # python/bootcamp/old/day_06/src/requirements.txt fixed in
        # cb5655c5).
        include:
          - reqs: machine_learning/project_01/requirements.txt
          - reqs: data_science/project_01/requirements.txt
          - reqs: data_science/bootcamp/day_03/src/requirements.txt
          - reqs: data_science/bootcamp/day_08/requirements.txt
          - reqs: data_science/bootcamp/day_09/requirements.txt
          - reqs: data_science/bootcamp/team_00/requirements.txt
          - reqs: data_science/bootcamp/team_01/requirements.txt
          - reqs: python/bootcamp/old/day_05/requirements.txt
          - reqs: python/bootcamp/old/day_06/src/requirements.txt
          - reqs: python/bootcamp/old/day_07/requirements.txt
          - reqs: python/bootcamp/old/day_08/requirements.txt
          - reqs: python/bootcamp/old/day_09/src/requirements.txt
          - reqs: python/bootcamp/old/team_01/src/requirements.txt
          - reqs: python/bootcamp/new/day_02/requirements.txt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip 'pip-audit==2.7.3'
      - name: Audit ${{ matrix.reqs }}
        run: |
          if [ -f "${{ matrix.reqs }}" ]; then
            # `-r` reads requirements file; `--strict` would fail on any
            # vuln but the soft gate is `|| true` for now.
            pip-audit -r "${{ matrix.reqs }}" || true
          else
            echo "Requirements file not found: ${{ matrix.reqs }}"
          fi

  pytest:
    name: pytest (${{ matrix.day }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Days / subprojects that ship test files. Add new entries here
        # as more subprojects gain test coverage.
        #
        # `flag` is the Codecov flag name (sanitised — no slashes,
        # since Codecov normalises `/` and we'd lose per-subproject
        # separation in the dashboard).
        include:
          - day: python/bootcamp/old/day_05
            workdir: python/bootcamp/old/day_05/src
            flag: python-bootcamp-old-day_05
          - day: python/bootcamp/old/day_07
            workdir: python/bootcamp/old/day_07
            flag: python-bootcamp-old-day_07
          - day: python/bootcamp/old/day_09
            workdir: python/bootcamp/old/day_09/src
            flag: python-bootcamp-old-day_09
          - day: data_science/project_01
            workdir: data_science/project_01/src
            flag: data_science-project_01
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: ${{ matrix.workdir }}
        run: |
          python -m pip install --upgrade pip
          # Per-day requirements first; pytest + pytest-cov are universal.
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest pytest-cov
      - name: Run tests with coverage
        working-directory: ${{ matrix.workdir }}
        run: |
          pytest -v --cov=. --cov-report=xml --cov-report=term || true
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.workdir }}/coverage.xml
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}-coverage
          fail_ci_if_error: false
          verbose: false
        continue-on-error: true

  sphinx:
    name: sphinx (${{ matrix.subproject }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Subprojects that ship a Sphinx setup. Day 07 is the
        # canonical case (Sphinx is part of the original task);
        # day_01 from the new track adopted the same skeleton so its
        # rich docstrings render the same way.
        include:
          - subproject: python/bootcamp/old/day_07
            workdir: python/bootcamp/old/day_07
            docs_dir: docs
          - subproject: python/bootcamp/new/day_01
            workdir: python/bootcamp/new/day_01
            docs_dir: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Sphinx + project requirements
        working-directory: ${{ matrix.workdir }}
        run: |
          python -m pip install --upgrade pip
          # Sphinx-specific requirements live in docs/requirements.txt
          # (day_01 layout); the day_07 layout puts them at the project
          # root. Check both before falling back to sphinx + furo.
          if [ -f ${{ matrix.docs_dir }}/requirements.txt ]; then pip install -r ${{ matrix.docs_dir }}/requirements.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          # Belt-and-braces: ensure sphinx is present even if not pinned.
          pip install sphinx furo
      - name: Build HTML
        working-directory: ${{ matrix.workdir }}/${{ matrix.docs_dir }}
        run: |
          # Standard Sphinx project: `make html` from the docs dir.
          make html || sphinx-build -b html source build/html
        continue-on-error: true
      - name: Upload generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-${{ matrix.subproject }}
          path: ${{ matrix.workdir }}/${{ matrix.docs_dir }}/build/html/
          if-no-files-found: ignore
          retention-days: 14
