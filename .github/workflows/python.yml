name: python

on:
  push:
    branches: [main]
    paths:
      - 'python/**'
      - 'algorithms/python/**'
      - 'data_science/**'
      - 'machine_learning/**'
      - 'qa/**'
      - '.ruff.toml'
      - '.github/workflows/python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - 'algorithms/python/**'
      - 'data_science/**'
      - 'machine_learning/**'
      - 'qa/**'
      - '.ruff.toml'
      - '.github/workflows/python.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: ruff (lint + format check)
    runs-on: ubuntu-latest
    # Format pass landed in commits 4243c5d2 + db3f12e4; format gate
    # is now hard. Lint gate stays soft until the remaining 181
    # findings (unsafe-fix territory) get per-subproject triage.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff==0.6.9
      - name: Lint (informational)
        run: ruff check python/ algorithms/python/ data_science/ machine_learning/ qa/ || true
      - name: Format check (gating)
        run: ruff format --check python/ algorithms/python/ data_science/ machine_learning/ qa/

  pytest:
    name: pytest (${{ matrix.day }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Days that ship test files. Add new entries here as more days
        # gain test coverage.
        include:
          - day: python/bootcamp/old/day_05
            workdir: python/bootcamp/old/day_05/src
          - day: python/bootcamp/old/day_07
            workdir: python/bootcamp/old/day_07
          - day: python/bootcamp/old/day_09
            workdir: python/bootcamp/old/day_09/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: ${{ matrix.workdir }}
        run: |
          python -m pip install --upgrade pip
          # Per-day requirements first; pytest is the universal fallback.
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest
      - name: Run tests
        working-directory: ${{ matrix.workdir }}
        run: pytest -v || true

  sphinx:
    name: sphinx (${{ matrix.subproject }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Subprojects that ship a Sphinx setup. Day 07 is the
        # canonical case (Sphinx is part of the original task).
        include:
          - subproject: python/bootcamp/old/day_07
            workdir: python/bootcamp/old/day_07
            docs_dir: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Sphinx + project requirements
        working-directory: ${{ matrix.workdir }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Belt-and-braces: ensure sphinx is present even if not pinned.
          pip install sphinx furo
      - name: Build HTML
        working-directory: ${{ matrix.workdir }}/${{ matrix.docs_dir }}
        run: |
          # Standard Sphinx project: `make html` from the docs dir.
          make html || sphinx-build -b html source build/html
        continue-on-error: true
      - name: Upload generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-${{ matrix.subproject }}
          path: ${{ matrix.workdir }}/${{ matrix.docs_dir }}/build/html/
          if-no-files-found: ignore
          retention-days: 14
