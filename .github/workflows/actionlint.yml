name: actionlint

# Meta-CI: lint the other workflows.
# Catches typos in `uses:` references, invalid `if:` expressions,
# unknown context keys, deprecated action versions, shellcheck issues
# inside `run:` blocks.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - 'codecov.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - 'codecov.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          # Hard-gated: actionlint reports are usually real issues
          # (deprecated `uses:` versions, malformed `if:` exprs,
          # shellcheck findings inside `run:` blocks). If a warning
          # is a false positive, suppress it at the source via
          # `# shellcheck disable=SCxxxx` or `# actionlint-disable`.
          fail_on_error: true
          reporter: github-check
          level: warning
