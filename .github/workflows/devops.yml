name: devops

on:
  push:
    branches: [main]
    paths:
      - 'devops/**'
      - '.github/workflows/devops.yml'
  pull_request:
    branches: [main]
    paths:
      - 'devops/**'
      - '.github/workflows/devops.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: devops-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck (bash lint)
    runs-on: ubuntu-latest
    continue-on-error: true  # informational until a deliberate format pass lands
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Lint
        run: |
          mapfile -t files < <(find devops/ \( -name '*.sh' -o -name '*.bash' \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          echo "Checking ${#files[@]} files..."
          shellcheck "${files[@]}" || true

  bats:
    name: bats (linux_monitoring_v1.0)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install bats (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: bats
          version: 1.0
      - name: Run bats suite
        working-directory: devops/linux_monitoring_v1.0
        run: bats tests/ || true

  hadolint:
    name: hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Find Dockerfiles
        id: find
        run: |
          files=$(find devops/ -name 'Dockerfile*' -not -path '*/.git/*' || true)
          if [ -z "$files" ]; then
            echo "no_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_files=false" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$files" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
      - name: Run hadolint
        if: steps.find.outputs.no_files == 'false'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          dockerfile: 'devops/**/Dockerfile*'
          failure-threshold: warning

  simple-docker-smoke:
    name: simple_docker smoke (compose up + curl)
    runs-on: ubuntu-latest
    continue-on-error: true
    # End-to-end smoke: build the FCGI server + nginx proxy from
    # devops/simple_docker/src/docker-compose.yml, wait for the proxy
    # healthcheck, GET http://localhost/, assert "Hello World!" in
    # body, tear down. This is the only non-trivial code in
    # devops/simple_docker — a green smoke proves the bootcamp's
    # multi-service Docker example actually works against current
    # Docker / docker-compose releases.
    steps:
      - uses: actions/checkout@v6
      - name: Show docker + compose versions
        run: |
          docker --version
          docker compose version
      - name: Build + start the stack
        working-directory: devops/simple_docker/src
        run: docker compose up -d --build
      - name: Wait for the proxy to respond
        run: |
          for i in $(seq 1 30); do
            body=$(curl -sS --max-time 2 http://localhost:80 || true)
            if [[ "$body" == *"Hello World"* ]]; then
              echo "Proxy returned Hello World after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Proxy never returned Hello World — dumping logs:"
          docker compose -f devops/simple_docker/src/docker-compose.yml logs --tail=200 || true
          exit 1
      - name: Tear down
        if: always()
        working-directory: devops/simple_docker/src
        run: docker compose down -v --remove-orphans
